name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Playwright Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Checkout the repository so the workflow can access the project files.
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Node.js 20 for a stable and production-ready test runtime.
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install dependencies from package-lock.json for reproducible CI builds.
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers and required Linux system dependencies.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run the full Playwright test suite.
      - name: Run Playwright tests
        run: npx playwright test

      # Upload the HTML report for every completed workflow run.
      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Upload raw test results only when the test run fails for easier debugging.
      - name: Upload Playwright test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
